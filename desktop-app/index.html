<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WoodWalaa Inquiries</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #12100e;
            color: #fdfbf7;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #d4a373;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .refresh-btn {
            background-color: #d4a373;
            color: #12100e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background-color: #faedcd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1c1815;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #3c332a;
        }

        th {
            background-color: #2a2420;
            color: #d1c7bd;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background-color: #2a2420;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            background-color: #3c332a;
            color: #d4a373;
        }
    </style>
</head>
<body>
    <h1>WoodWalaa Inquiries Dashboard</h1>
    <button class="refresh-btn" id="refresh-btn">Refetch Submissions</button>
    
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Email</th>
                <th>Service Type</th>
                <th>Message</th>
            </tr>
        </thead>
        <tbody id="submissions-body">
            <!-- Data will be populated here -->
        </tbody>
    </table>

    <script>
        const { ipcRenderer } = require('electron');

        async function loadSubmissions() {
            const tableBody = document.getElementById('submissions-body');
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Loading...</td></tr>';
            
            try {
                const submissions = await ipcRenderer.invoke('fetch-submissions');
                
                if (!submissions || submissions.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No submissions found.</td></tr>';
                    return;
                }

                tableBody.innerHTML = submissions.map(sub => {
                    const date = new Date(sub.submittedAt).toLocaleString();
                    const serviceType = sub.service === 'custom_woodwork' ? 'Custom Woodwork' 
                                      : sub.service === 'bat_repair' ? 'Bat Repair' 
                                      : 'Other';

                    return \`
                        <tr>
                            <td>\${date}</td>
                            <td>\${sub.name}</td>
                            <td><a href="mailto:\${sub.email}" style="color: #d4a373; text-decoration: none;">\${sub.email}</a></td>
                            <td><span class="status-badge">\${serviceType}</span></td>
                            <td style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="\${sub.message}">
                                \${sub.message}
                            </td>
                        </tr>
                    \`;
                }).join('');
            } catch (error) {
                console.error('Error loading submissions:', error);
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Error loading data. Check console.</td></tr>';
            }
        }

        document.getElementById('refresh-btn').addEventListener('click', loadSubmissions);

        // Load initially
        loadSubmissions();
    </script>
</body>
</html>
